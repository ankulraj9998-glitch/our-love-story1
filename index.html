<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
}

/* SLIDER */

.slider{
    position:relative;
    width:100vw;
    height:100vh;
}

.slide{
    position:absolute;
    width:100%;
    height:100%;
    opacity:0;
    transition:1s;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    color:white;
    padding:20px;
}

.slide.active{
    opacity:1;
    z-index:1;
}

/* PHOTOS */

.main-photo{
    width:300px;
    height:400px;
    object-fit:cover;
    border-radius:25px;
    border:6px solid rgba(255,255,255,0.7);
    box-shadow:0 10px 35px rgba(0,0,0,0.4);
    animation:float 4s ease-in-out infinite;
}

/* TEXT */

.caption{
    margin-top:20px;
    font-size:2rem;
    font-weight:bold;
    text-shadow:2px 2px 8px rgba(0,0,0,0.5);
}

.small-text{
    margin-top:15px;
    font-size:1.1rem;
    line-height:1.8;
    animation:fadeIn 0.5s ease;
}

/* BUTTONS */

.answer-btn,
.next-btn{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    color:white;
    font-size:1rem;
    cursor:pointer;
    font-weight:bold;
    transition:0.25s;
}

.answer-btn:hover,
.next-btn:hover{
    transform:scale(1.05);
}

.answer-btn:active,
.next-btn:active{
    transform:scale(0.88);
}

.no-btn{
    background:#ff4f81;
}

.yes-btn{
    background:#7b4dff;
}

.next-btn{
    margin-top:20px;
    background:white;
    color:#ff4f81;
}

/* ANIMATIONS */

@keyframes float{

    0%,100%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-15px);
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* HEARTS */

.hearts{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
}

.heart{
    position:absolute;
    color:rgba(255,255,255,0.7);
    animation:rise linear infinite;
}

@keyframes rise{

    from{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
    }

    to{
        transform:translateY(-10vh) scale(1.2);
        opacity:1;
    }
}

/* MUSIC */

.music-btn{
    position:absolute;
    bottom:20px;
    right:20px;
    background:rgba(255,255,255,0.2);
    border:2px solid white;
    color:white;
    padding:12px 20px;
    border-radius:30px;
    cursor:pointer;
    z-index:10;
}

/* MOBILE */

@media(max-width:600px){

    .main-photo{
        width:230px;
        height:320px;
    }

    .caption{
        font-size:1.5rem;
    }
}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div class="slider">

<!-- SLIDE 1 -->

<div class="slide active">

<img src="photo1.jpg" class="main-photo">

<div class="caption">
Do You Think Your Boyfriend Loves You A Lot? ❤️
</div>

<div class="small-text" id="answerBox1">
Choose your answer 😌
</div>

<div style="margin-top:20px; display:flex; gap:15px;">

<button class="answer-btn no-btn"
onclick="showAnswer1('no')">
NO 💔
</button>

<button class="answer-btn yes-btn"
onclick="showAnswer1('yes')">
YES ❤️
</button>

</div>

<div id="slide1Buttons"></div>

</div>

<!-- SLIDE 2 -->

<div class="slide">

<img src="photo2.jpg" class="main-photo">

<div class="caption">
Do You Know How Cute You Are? 🌸
</div>

<div class="small-text" id="answerBox2">
Choose your answer 😌
</div>

<div style="margin-top:20px; display:flex; gap:15px;">

<button class="answer-btn no-btn"
onclick="showAnswer2('no')">
NO 💔
</button>

<button class="answer-btn yes-btn"
onclick="showAnswer2('yes')">
YES ❤️
</button>

</div>

<div id="slide2Buttons"></div>

</div>

<!-- SLIDE 3 -->

<div class="slide">

<img src="photo3.jpg" class="main-photo">

<div class="caption">
Who Makes My Days Better? ✨
</div>

<div class="small-text" id="slide3Text">
Choose carefully 😌❤️
</div>

<div 
style="
margin-top:25px;
position:relative;
width:320px;
height:180px;
">

<button class="answer-btn yes-btn"
onclick="showLoveAnswer()"
style="
position:absolute;
left:20px;
top:50px;
">
YOU ❤️
</button>

<button 
id="runawayBtn"
class="answer-btn no-btn"

onmouseover="moveButton()"
ontouchstart="moveButton()"

style="
position:absolute;
right:20px;
top:50px;
">
Other People 😒
</button>

</div>

<div id="slide3Buttons"></div>

</div>

<!-- SLIDE 4 -->

<div class="slide">

<img src="photo4.jpg" class="main-photo">

<div class="caption">
Do I Make You Happy? 💞
</div>

<div class="small-text" id="slide4Text">
Choose carefully 😌❤️
</div>

<div 
style="
margin-top:25px;
position:relative;
width:100%;
height:250px;
">

<button class="answer-btn yes-btn"
onclick="showHappyAnswer()"
style="
position:absolute;
left:40%;
top:80px;
">
YES ❤️
</button>

<button 
id="farRunBtn"
class="answer-btn no-btn"

onmouseover="moveFarButton()"
ontouchstart="moveFarButton()"

style="
position:absolute;
left:70%;
top:30px;
">
NO 😒
</button>

</div>

<div id="slide4Buttons"></div>

</div>

<!-- SLIDE 5 -->

<div class="slide">

<img src="photo5.jpg" class="main-photo">

<div class="caption">
I Love You Endlessly ❤️
</div>

<div class="small-text">
No matter what happens, it'll always be you 💖
</div>

</div>

</div>

<!-- MUSIC -->

<button class="music-btn"
onclick="toggleMusic()">
🎵 Play Music
</button>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* SLIDES */

const slides=document.querySelectorAll('.slide');

let current=0;

function showSlide(index){

slides.forEach(slide=>{
slide.classList.remove('active');
});

slides[index].classList.add('active');
}

function nextSlide(){

current++;

if(current>=slides.length){
current=slides.length-1;
}

showSlide(current);
}

/* FIRST QUESTION */

function showAnswer1(choice){

const box=document.getElementById('answerBox1');
const buttons=document.getElementById('slide1Buttons');

if(choice==='no'){

box.innerHTML=`
😌💕<br><br>
Seeeeee...<br>
He actually loves you superrrrrrr a lot ❤️
`;

}else{

box.innerHTML=`
😜📸<br><br>
Then rules are rules...<br>
Now give him a cute photo 💖
`;

}

buttons.innerHTML=`

<button class="next-btn"
onclick="nextSlide()">
Continue 💖
</button>

`;

}

/* SECOND QUESTION */

function showAnswer2(choice){

const box=document.getElementById('answerBox2');
const buttons=document.getElementById('slide2Buttons');

if(choice==='no'){

box.innerHTML=`
🌸✨<br><br>

तेरी खूबसूरती का क्या कहना,<br>
चाँद भी तुझसे रोशनी माँगे ❤️
`;

}else{

box.innerHTML=`
🥺💖<br><br>

You are literally the world's cutest girl 😭❤️<br><br>

Now send your boyfriend some cute pics too 😜📸
`;

}

buttons.innerHTML=`

<button class="next-btn"
onclick="nextSlide()">
Continue 💖
</button>

`;

}

/* THIRD SLIDE */

function moveButton(){

const btn=document.getElementById('runawayBtn');

const randomX=Math.floor(Math.random()*200);
const randomY=Math.floor(Math.random()*100);

btn.style.left=randomX+'px';
btn.style.top=randomY+'px';
}

function showLoveAnswer(){

document.getElementById('slide3Text')
.innerHTML=`
😭❤️<br><br>
Awwwwww...<br>
I knew it would always be YOU 💖
`;

document.getElementById('slide3Buttons')
.innerHTML=`

<button class="next-btn"
onclick="nextSlide()">
Continue 💖
</button>

`;
}

/* FOURTH SLIDE */

function moveFarButton(){

const btn=document.getElementById('farRunBtn');

const randomX=Math.floor(Math.random()*800);
const randomY=Math.floor(Math.random()*300);

btn.style.left=randomX+'px';
btn.style.top=randomY+'px';
}

function showHappyAnswer(){

document.getElementById('slide4Text')
.innerHTML=`
🥺💕<br><br>
You make me the world's happiest person 💖
`;

document.getElementById('slide4Buttons')
.innerHTML=`

<button class="next-btn"
onclick="nextSlide()">
Final Slide ❤️
</button>

`;
}

/* HEARTS */

const heartsContainer=
document.getElementById('hearts');

function createHeart(){

const heart=document.createElement('div');

heart.classList.add('heart');

heart.innerHTML='❤';

heart.style.left=Math.random()*100+'vw';

heart.style.animationDuration=
(Math.random()*3+3)+'s';

heart.style.fontSize=
(Math.random()*20+15)+'px';

heartsContainer.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,300);

/* MUSIC */

const music=
document.getElementById('bgMusic');

let playing=false;

function toggleMusic(){

if(!playing){

music.play();

playing=true;

document.querySelector('.music-btn')
.innerHTML='⏸ Pause Music';

}else{

music.pause();

playing=false;

document.querySelector('.music-btn')
.innerHTML='🎵 Play Music';

}
}

</script>

</body>
</html>
